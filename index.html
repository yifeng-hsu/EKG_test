<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS 複選版紀錄器</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* 計時器 */
        .timer-box { text-align: center; background: #222; color: #0f0; padding: 12px; border-radius: 10px; margin-bottom: 15px; position: sticky; top: 0; z-index: 100; }
        #timer { font-size: 3rem; font-family: monospace; font-weight: bold; }
        .timer-ctrl button { padding: 8px 12px; margin: 5px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-start { background: #28a745; color: white; }
        .btn-pause { background: #ffc107; color: black; }
        .btn-reset { background: #dc3545; color: white; }

        /* 摘要區 */
        #summary { background: #fffde7; padding: 12px; border: 2px solid #fff59d; border-radius: 10px; margin-bottom: 15px; font-size: 0.95rem; }
        .summary-line { margin-bottom: 4px; border-bottom: 1px solid #eee; min-height: 1.5em; display: flex; }
        .summary-label { font-weight: bold; color: #555; min-width: 85px; flex-shrink: 0; }
        .summary-content { color: #333; word-break: break-all; }

        /* 按鈕列 */
        .row { margin-bottom: 15px; padding: 10px; border-radius: 8px; border: 1px solid #f0f0f0; }
        .row-title { font-weight: bold; display: block; margin-bottom: 8px; color: #333; font-size: 1rem; border-left: 4px solid #28a745; padding-left: 8px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        
        button.opt { 
            padding: 10px 14px; border: 1px solid #ccc; background: white; border-radius: 6px; 
            cursor: pointer; font-size: 1rem; transition: 0.2s;
        }
        button.opt.active { background-color: #28a745 !important; color: white !important; border-color: #1e7e34; }
        .sep { color: #bbb; font-weight: bold; }

        /* GCS 專用 */
        .gcs-row { background: #f8f9fa; }
        .gcs-score { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="timer-box">
        <div id="timer">00:00</div>
        <div class="timer-ctrl">
            <button class="btn-start" onclick="startTimer()">開始</button>
            <button class="btn-pause" onclick="pauseTimer()">暫停</button>
            <button class="btn-reset" onclick="resetTimer()">復歸</button>
        </div>
    </div>

    <div id="summary">
        <div class="summary-line"><span class="summary-label">意識：</span><span class="summary-content" id="out-意識">-</span></div>
        <div class="summary-line"><span class="summary-label">呼吸道：</span><span class="summary-content" id="out-呼吸道">-</span></div>
        <div class="summary-line"><span class="summary-label">呼吸/胸部：</span><span class="summary-content" id="out-呼吸胸部">-</span></div>
        <div class="summary-line"><span class="summary-label">頸部：</span><span class="summary-content" id="out-頸部">-</span></div>
        <div class="summary-line"><span class="summary-label">循環/肢體：</span><span class="summary-content" id="out-循環">-</span></div>
        <div class="summary-line"><span class="summary-label">GCS：</span><span class="summary-content" id="out-GCS" class="gcs-score">E- V- M- (總分：-)</span></div>
        <div class="summary-line"><span class="summary-label">其他：</span><span class="summary-content" id="out-其他">-</span></div>
    </div>

    <!-- 意識 (建議單選) -->
    <div class="row" data-cat="意識">
        <span class="row-title">意識：</span>
        <div class="btn-group">
            <button class="opt" onclick="toggleBtn(this, '意識')">清</button><span class="sep">-</span>
            <button class="opt" onclick="toggleBtn(this, '意識')">聲</button><span class="sep">-</span>
            <button class="opt" onclick="toggleBtn(this, '意識')">痛</button><span class="sep">-</span>
            <button class="opt" onclick="toggleBtn(this, '意識')">否</button>
        </div>
    </div>

    <div class="row" data-cat="呼吸道">
        <span class="row-title">呼吸道：</span>
        <div class="btn-group"><button class="opt" onclick="toggleBtn(this, '呼吸道')">阻塞</button></div>
    </div>

    <div class="row" data-cat="呼吸胸部">
        <span class="row-title">呼吸：</span>
        <div class="btn-group">
            <button class="opt" onclick="toggleBtn(this, '呼吸胸部')">淺快</button><span class="sep">-</span>
            <button class="opt" onclick="toggleBtn(this, '呼吸胸部')">慢</button>
        </div>
    </div>

    <div class="row" data-cat="頸部">
        <span class="row-title">頸部檢查：</span>
        <div class="btn-group">
            <button class="opt" onclick="toggleBtn(this, '頸部')">氣管偏移</button><span class="sep">-</span>
            <button class="opt" onclick="toggleBtn(this, '頸部')">頸靜脈怒張</button><span class="sep">-</span>
            <button class="opt" onclick="toggleBtn(this, '頸部')">頸椎壓痛</button>
        </div>
    </div>

    <div class="row" data-cat="呼吸胸部">
        <span class="row-title">胸部（視/聽/叩/觸）：</span>
        <div class="btn-group">
            <button class="opt" onclick="toggleBtn(this, '呼吸胸部', '視:瘀傷')">視:瘀傷</button>
            <button class="opt" onclick="toggleBtn(this, '呼吸胸部', '視:不對稱')">視:不對稱</button>
            <button class="opt" onclick="toggleBtn(this, '呼吸胸部', '聽:沒心音')">聽:沒心音</button>
            <button class="opt" onclick="toggleBtn(this, '呼吸胸部', '叩:濁音')">叩:濁音</button>
            <button class="opt" onclick="toggleBtn(this, '呼吸胸部', '觸:皮下氣腫')">觸:皮下氣腫</button>
            <button class="opt" onclick="toggleBtn(this, '呼吸胸部', '觸:壓痛')">觸:壓痛</button>
        </div>
    </div>

    <div class="row" data-cat="循環">
        <span class="row-title">循環（饒動脈/肢體/膚色/CRT）：</span>
        <div class="btn-group">
            <button class="opt" onclick="toggleBtn(this, '循環', '動脈:不對稱')">動脈:不對稱</button>
            <button class="opt" onclick="toggleBtn(this, '循環', '動脈:摸不到')">動脈:摸不到</button>
            <button class="opt" onclick="toggleBtn(this, '循環', '肢體:濕冷')">肢體:濕冷</button>
            <button class="opt" onclick="toggleBtn(this, '循環', '肢體:溫暖')">肢體:溫暖</button>
            <button class="opt" onclick="toggleBtn(this, '循環', '膚色:蒼白')">膚色:蒼白</button>
            <button class="opt" onclick="toggleBtn(this, '循環', '膚色:發紺')">膚色:發紺</button>
            <button class="opt" onclick="toggleBtn(this, '循環', 'CRT:1s')">1s</button>
            <button class="opt" onclick="toggleBtn(this, '循環', 'CRT:2s')">2s</button>
            <button class="opt" onclick="toggleBtn(this, '循環', 'CRT:3s')">3s</button>
            <button class="opt" onclick="toggleBtn(this, '循環', 'CRT:4s')">4s</button>
            <button class="opt" onclick="toggleBtn(this, '循環', 'CRT:5s')">5s</button>
        </div>
    </div>

    <div class="row gcs-row">
        <span class="row-title">GCS (單選)：</span>
        <div class="btn-group">E: <button class="opt" onclick="setGCS('E',4,this)">4</button><button class="opt" onclick="setGCS('E',3,this)">3</button><button class="opt" onclick="setGCS('E',2,this)">2</button><button class="opt" onclick="setGCS('E',1,this)">1</button></div>
        <div class="btn-group" style="margin-top:5px">V: <button class="opt" onclick="setGCS('V',5,this)">5</button><button class="opt" onclick="setGCS('V',4,this)">4</button><button class="opt" onclick="setGCS('V',3,this)">3</button><button class="opt" onclick="setGCS('V',2,this)">2</button><button class="opt" onclick="setGCS('V',1,this)">1</button></div>
        <div class="btn-group" style="margin-top:5px">M: <button class="opt" onclick="setGCS('M',6,this)">6</button><button class="opt" onclick="setGCS('M',5,this)">5</button><button class="opt" onclick="setGCS('M',4,this)">4</button><button class="opt" onclick="setGCS('M',3,this)">3</button><button class="opt" onclick="setGCS('M',2,this)">2</button><button class="opt" onclick="setGCS('M',1,this)">1</button></div>
    </div>

    <div class="row" data-cat="其他">
        <span class="row-title">骨盆/瞳孔/感動：</span>
        <div class="btn-group">
            <button class="opt" onclick="toggleBtn(this, '其他', '骨盆不穩')">骨盆不穩</button>
            <button class="opt" onclick="toggleBtn(this, '其他', '瞳孔不等大')">瞳孔不等大</button>
            <button class="opt" onclick="toggleBtn(this, '其他', '瞳孔無反應')">瞳孔無反應</button>
            <button class="opt" onclick="toggleBtn(this, '其他', '上肢無感覺')">上肢無感覺</button>
            <button class="opt" onclick="toggleBtn(this, '其他', '下肢無感覺')">下肢無感覺</button>
        </div>
    </div>
</div>

<script>
    // 計時器邏輯
    let sec = 0, timerRun = null;
    function startTimer() { if (!timerRun) timerRun = setInterval(() => { sec++; updateT(); }, 1000); }
    function pauseTimer() { clearInterval(timerRun); timerRun = null; }
    function resetTimer() { pauseTimer(); sec = 0; updateT(); }
    function updateT() {
        let m = Math.floor(sec/60).toString().padStart(2,'0'), s = (sec%60).toString().padStart(2,'0');
        document.getElementById('timer').innerText = `${m}:${s}`;
    }

    // 複選邏輯
    function toggleBtn(btn, catId, customText) {
        // 切換按鈕自身的 active 狀態
        btn.classList.toggle('active');
        
        // 抓取該類別下所有被點亮的按鈕內容
        // 注意：有些按鈕是在不同的 .btn-group 但屬於同一個 catId
        const allActiveInCat = [];
        const rows = document.querySelectorAll(`.row[data-cat="${catId}"]`);
        rows.forEach(row => {
            row.querySelectorAll('.opt.active').forEach(b => {
                // 如果有 customText 屬性(存在標籤或傳入)，優先使用
                allActiveInCat.push(b.getAttribute('data-val') || b.innerText);
            });
        });

        // 也可以直接在按鈕 HTML 寫死 data-val，如果沒有就用 innerText
        if(customText && !btn.getAttribute('data-val')) btn.setAttribute('data-val', customText);

        const displayStr = allActiveInCat.length > 0 ? allActiveInCat.join('、') : '-';
        document.getElementById(`out-${catId}`).innerText = displayStr;
    }

    // GCS 邏輯 (維持單選)
    let gcsValues = { E: '-', V: '-', M: '-' };
    function setGCS(type, score, btn) {
        const siblings = btn.parentElement.querySelectorAll('.opt');
        siblings.forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        gcsValues[type] = score;
        let total = (Number.isInteger(gcsValues.E) && Number.isInteger(gcsValues.V) && Number.isInteger(gcsValues.M)) 
                    ? (gcsValues.E + gcsValues.V + gcsValues.M) : '-';
        document.getElementById('out-GCS').innerText = `E${gcsValues.E} V${gcsValues.V} M${gcsValues.M} (總分：${total})`;
    }
</script>

</body>
</html>
