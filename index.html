<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫療救護評估工具</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* 計時器樣式 */
        #timer { font-size: 3rem; text-align: center; font-weight: bold; color: #d9534f; margin-bottom: 10px; font-family: monospace; }
        
        /* 顯示選擇結果區域 */
        #display-board { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.6; border-left: 5px solid #28a745; }
        #display-board div { margin-bottom: 5px; }

        /* 按鈕列樣式 */
        .row { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .row-title { font-weight: bold; margin-bottom: 8px; display: block; color: #555; }
        .btn-group { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; }
        
        button { 
            padding: 8px 15px; border: 1px solid #ddd; background: white; border-radius: 5px; 
            cursor: pointer; transition: all 0.2s; font-size: 1rem;
        }
        button.active { background-color: #28a745; color: white; border-color: #218838; }
        .separator { color: #ccc; margin: 0 2px; }

        .gcs-total { font-weight: bold; color: #007bff; }
    </style>
</head>
<body>

<div class="container">
    <!-- 第一列：計時器 -->
    <div id="timer">00:00</div>

    <!-- 顯示選中內容 -->
    <div id="display-board" id="summary">
        <strong>即時摘要：</strong>
        <div id="out-意識">意識：未選擇</div>
        <div id="out-呼吸道">呼吸道：未選擇</div>
        <div id="out-呼吸">呼吸：未選擇</div>
        <div id="out-胸部視診">胸部視診：未選擇</div>
        <div id="out-胸部聽診">胸部聽診：未選擇</div>
        <div id="out-胸部叩診">胸部叩診：未選擇</div>
        <div id="out-胸部觸診">胸部觸診：未選擇</div>
        <div id="out-饒動脈">饒動脈：未選擇</div>
        <div id="out-肢體">肢體：未選擇</div>
        <div id="out-膚色">膚色：未選擇</div>
        <div id="out-CRT">CRT：未選擇</div>
        <div id="out-骨盆">骨盆：未選擇</div>
        <div id="out-GCS">GCS：E- V- M- (共 - 分)</div>
        <div id="out-瞳孔">瞳孔：未選擇</div>
        <div id="out-感動">感動：未選擇</div>
    </div>

    <hr>

    <!-- 按鈕控制區 -->
    <div id="controls">
        <!-- 意識 -->
        <div class="row" data-category="意識">
            <span class="row-title">意識：</span>
            <div class="btn-group">
                <button onclick="select(this, '意識')">清</button><span class="separator">-</span>
                <button onclick="select(this, '意識')">聲</button><span class="separator">-</span>
                <button onclick="select(this, '意識')">痛</button><span class="separator">-</span>
                <button onclick="select(this, '意識')">否</button>
            </div>
        </div>

        <div class="row" data-category="呼吸道">
            <span class="row-title">呼吸道：</span>
            <button onclick="select(this, '呼吸道')">阻塞</button>
        </div>

        <div class="row" data-category="呼吸">
            <span class="row-title">呼吸：</span>
            <div class="btn-group">
                <button onclick="select(this, '呼吸')">淺快</button><span class="separator">-</span>
                <button onclick="select(this, '呼吸')">慢</button>
            </div>
        </div>

        <div class="row" data-category="胸部視診">
            <span class="row-title">胸部視診：</span>
            <div class="btn-group">
                <button onclick="select(this, '胸部視診')">瘀傷</button><span class="separator">-</span>
                <button onclick="select(this, '胸部視診')">不對稱</button>
            </div>
        </div>

        <div class="row" data-category="胸部聽診">
            <span class="row-title">胸部聽診：</span>
            <button onclick="select(this, '胸部聽診')">沒有心音</button>
        </div>

        <div class="row" data-category="胸部叩診">
            <span class="row-title">胸部叩診：</span>
            <button onclick="select(this, '胸部叩診')">濁音</button>
        </div>

        <div class="row" data-category="胸部觸診">
            <span class="row-title">胸部觸診：</span>
            <div class="btn-group">
                <button onclick="select(this, '胸部觸診')">皮下氣腫</button><span class="separator">-</span>
                <button onclick="select(this, '胸部觸診')">壓痛</button>
            </div>
        </div>

        <div class="row" data-category="饒動脈">
            <span class="row-title">饒動脈：</span>
            <div class="btn-group">
                <button onclick="select(this, '饒動脈')">不對稱</button><span class="separator">-</span>
                <button onclick="select(this, '饒動脈')">摸不到</button>
            </div>
        </div>

        <div class="row" data-category="肢體">
            <span class="row-title">肢體：</span>
            <div class="btn-group">
                <button onclick="select(this, '肢體')">濕冷</button><span class="separator">-</span>
                <button onclick="select(this, '肢體')">溫暖</button>
            </div>
        </div>

        <div class="row" data-category="膚色">
            <span class="row-title">膚色：</span>
            <div class="btn-group">
                <button onclick="select(this, '膚色')">蒼白</button><span class="separator">-</span>
                <button onclick="select(this, '膚色')">發紺</button>
            </div>
        </div>

        <div class="row" data-category="CRT">
            <span class="row-title">CRT：</span>
            <div class="btn-group">
                <button onclick="select(this, 'CRT')">1秒</button><span class="separator">-</span>
                <button onclick="select(this, 'CRT')">2秒</button><span class="separator">-</span>
                <button onclick="select(this, 'CRT')">3秒</button><span class="separator">-</span>
                <button onclick="select(this, 'CRT')">4秒</button><span class="separator">-</span>
                <button onclick="select(this, 'CRT')">5秒</button>
            </div>
        </div>

        <div class="row" data-category="骨盆">
            <span class="row-title">骨盆：</span>
            <button onclick="select(this, '骨盆')">不穩固</button>
        </div>

        <!-- GCS 設計 -->
        <div class="row">
            <span class="row-title">GCS 評分：</span>
            <div class="btn-group">
                E: 
                <button onclick="updateGCS('E', 4, this)">4</button>
                <button onclick="updateGCS('E', 3, this)">3</button>
                <button onclick="updateGCS('E', 2, this)">2</button>
                <button onclick="updateGCS('E', 1, this)">1</button>
            </div>
            <div class="btn-group" style="margin-top:5px">
                V: 
                <button onclick="updateGCS('V', 5, this)">5</button>
                <button onclick="updateGCS('V', 4, this)">4</button>
                <button onclick="updateGCS('V', 3, this)">3</button>
                <button onclick="updateGCS('V', 2, this)">2</button>
                <button onclick="updateGCS('V', 1, this)">1</button>
            </div>
            <div class="btn-group" style="margin-top:5px">
                M: 
                <button onclick="updateGCS('M', 6, this)">6</button>
                <button onclick="updateGCS('M', 5, this)">5</button>
                <button onclick="updateGCS('M', 4, this)">4</button>
                <button onclick="updateGCS('M', 3, this)">3</button>
                <button onclick="updateGCS('M', 2, this)">2</button>
                <button onclick="updateGCS('M', 1, this)">1</button>
            </div>
        </div>

        <div class="row" data-category="瞳孔">
            <span class="row-title">瞳孔：</span>
            <div class="btn-group">
                <button onclick="select(this, '瞳孔')">不等大</button><span class="separator">-</span>
                <button onclick="select(this, '瞳孔')">對光沒反應</button>
            </div>
        </div>

        <div class="row" data-category="感動">
            <span class="row-title">感動：</span>
            <div class="btn-group">
                <button onclick="select(this, '感動')">上肢沒感覺</button><span class="separator">-</span>
                <button onclick="select(this, '感動')">下肢沒感覺</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 計時器邏輯
    let seconds = 0;
    const timerElement = document.getElementById('timer');
    setInterval(() => {
        seconds++;
        let mins = Math.floor(seconds / 60);
        let secs = seconds % 60;
        timerElement.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }, 1000);

    // 按鈕選擇邏輯
    function select(btn, category) {
        // 移除同一個父容器內其他按鈕的 active 狀態
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.classList.remove('active'));
        
        // 切換當前按鈕狀態
        btn.classList.add('active');
        
        // 更新顯示板
        document.getElementById(`out-${category}`).innerText = `${category}：${btn.innerText}`;
    }

    // GCS 專用邏輯
    let gcs = { E: '-', V: '-', M: '-' };
    function updateGCS(type, score, btn) {
        // 清除該排顏色
        const siblingButtons = btn.parentElement.querySelectorAll('button');
        siblingButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        gcs[type] = score;
        const total = (typeof gcs.E === 'number' && typeof gcs.V === 'number' && typeof gcs.M === 'number') 
                      ? (gcs.E + gcs.V + gcs.M) 
                      : '-';
        
        document.getElementById('out-GCS').innerHTML = `GCS：E${gcs.E} V${gcs.V} M${gcs.M} <span class="gcs-total">(共 ${total} 分)</span>`;
    }
</script>

</body>
</html>
